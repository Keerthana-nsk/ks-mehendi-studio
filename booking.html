<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Bookings | KS Mehendi Studio</title>

<link rel="stylesheet" href="style.css">
</head>

<style>
    
.back-btn{
display:block;
width:200px;
margin:30px auto;
text-align:center;
padding:12px;
background:#b8860b;
color:white;
text-decoration:none;
border-radius:5px;
}
</style>

<body>

<section id="booking">

<h2>Book Your Mehendi Appointment</h2>

<form id="bookingForm">

<label>Select Date *</label>
<input type="date" id="date" required>

<label>Select Time Slot *</label>
<select id="time" required>
<option value="">Choose time</option>
<option>08:00 AM</option>
<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>12:00 PM</option>
<option>01:00 PM</option>
<option>02:00 PM</option>
<option>03:00 PM</option>
<option>04:00 PM</option>
<option>05:00 PM</option>
<option>06:00 PM</option>
<option>07:00 PM</option>
<option>08:00 PM</option>
<option>09:00 PM</option>
</select>

<label>Name *</label>
<input type="text" id="name" placeholder="Jane Smith" required>

<label>Email address *</label>
<input type="email" id="email" placeholder="email@website.com" required>

<label>Phone number *</label>
<input type="tel" id="phone" placeholder="9876543210" required>

<label>Which service are you interested in?</label>

<select id="service">
<option>Free Consultant</option>
<option>Henna cone order</option>
<option>Mehendi booking</option>
</select>

<label>Message</label>
<textarea id="message" rows="4"></textarea>

<button type="submit">Submit</button>

</form>

</section>

<a href="index.html" class="back-btn">Back to Home</a>

</body>
</html>
